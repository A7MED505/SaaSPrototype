<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FirstSaaS — Home</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav class="navbar">
    <a class="brand" href="index.html">FirstSaaS</a>
    <div class="nav-links">
      <a href="products.html">Products</a>
      <a href="cart.html">🛒 <span id="cart-count">0</span></a>
      <span id="nav-user"></span>
      <button id="nav-login-btn" class="btn-sm" onclick="openModal('login-modal')">Login</button>
      <button id="nav-logout-btn" class="btn-sm hidden" onclick="logout()">Logout</button>
    </div>
  </nav>

  <header class="hero">
    <div class="hero-content">
      <h1>Discover Amazing Products</h1>
      <p>Shop smarter with personalized recommendations</p>
      <a href="products.html" class="btn-primary">Shop Now</a>
    </div>
  </header>

  <section class="section">
    <h2 class="section-title">Recommended for You</h2>
    <div id="recommendations" class="product-grid">
      <p class="placeholder-text">Login to see personalized recommendations.</p>
    </div>
  </section>

  <section class="section bg-light">
    <h2 class="section-title">Featured Categories</h2>
    <div id="categories" class="category-grid"></div>
  </section>

  <!-- Login Modal -->
  <div id="login-modal" class="modal hidden">
    <div class="modal-box">
      <h3>Login</h3>
      <input id="login-email" type="email" placeholder="Email" />
      <input id="login-password" type="password" placeholder="Password" />
      <div id="login-error" class="error-msg hidden"></div>
      <button class="btn-primary" onclick="submitLogin()">Login</button>
      <p>No account? <a href="#" onclick="openModal('register-modal'); closeModal('login-modal')">Register</a></p>
      <button class="modal-close" onclick="closeModal('login-modal')">✕</button>
    </div>
  </div>

  <!-- Register Modal -->
  <div id="register-modal" class="modal hidden">
    <div class="modal-box">
      <h3>Register</h3>
      <input id="reg-name" type="text" placeholder="Full Name" />
      <input id="reg-email" type="email" placeholder="Email" />
      <input id="reg-password" type="password" placeholder="Password (min 6 chars)" />
      <div id="reg-error" class="error-msg hidden"></div>
      <button class="btn-primary" onclick="submitRegister()">Register</button>
      <p>Have an account? <a href="#" onclick="openModal('login-modal'); closeModal('register-modal')">Login</a></p>
      <button class="modal-close" onclick="closeModal('register-modal')">✕</button>
    </div>
  </div>

  <footer class="footer">
    <p>&copy; 2026 FirstSaaS. All rights reserved.</p>
  </footer>

  <script src="app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      updateNavAuth();
      await loadCategories();
      if (getToken()) await loadRecommendations();
    });

    async function loadRecommendations() {
      try {
        const data = await apiFetch('/api/recommendations/?limit=4');
        const container = document.getElementById('recommendations');
        if (!data.length) { container.innerHTML = '<p class="placeholder-text">No recommendations yet.</p>'; return; }
        container.innerHTML = data.map(productCard).join('');
      } catch {}
    }

    async function loadCategories() {
      try {
        const cats = await apiFetch('/api/products/categories');
        const container = document.getElementById('categories');
        container.innerHTML = cats.map(c => `
          <a href="products.html?category=${encodeURIComponent(c)}" class="category-card">${c}</a>
        `).join('');
      } catch {}
    }
  </script>
</body>
</html>
