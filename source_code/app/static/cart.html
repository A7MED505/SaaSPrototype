<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FirstSaaS — Cart</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav class="navbar">
    <a class="brand" href="index.html">FirstSaaS</a>
    <div class="nav-links">
      <a href="products.html">Products</a>
      <a href="cart.html">🛒 <span id="cart-count">0</span></a>
      <span id="nav-user"></span>
      <button id="nav-login-btn" class="btn-sm" onclick="openModal('login-modal')">Login</button>
      <button id="nav-logout-btn" class="btn-sm hidden" onclick="logout()">Logout</button>
    </div>
  </nav>

  <div class="cart-container">
    <h2>Your Cart</h2>
    <div id="cart-content">
      <p class="placeholder-text">Loading...</p>
    </div>
  </div>

  <!-- Login Modal -->
  <div id="login-modal" class="modal hidden">
    <div class="modal-box">
      <h3>Login</h3>
      <input id="login-email" type="email" placeholder="Email" />
      <input id="login-password" type="password" placeholder="Password" />
      <div id="login-error" class="error-msg hidden"></div>
      <button class="btn-primary" onclick="submitLogin()">Login</button>
      <p>No account? <a href="#" onclick="openModal('register-modal'); closeModal('login-modal')">Register</a></p>
      <button class="modal-close" onclick="closeModal('login-modal')">✕</button>
    </div>
  </div>

  <!-- Register Modal -->
  <div id="register-modal" class="modal hidden">
    <div class="modal-box">
      <h3>Register</h3>
      <input id="reg-name" type="text" placeholder="Full Name" />
      <input id="reg-email" type="email" placeholder="Email" />
      <input id="reg-password" type="password" placeholder="Password (min 6 chars)" />
      <div id="reg-error" class="error-msg hidden"></div>
      <button class="btn-primary" onclick="submitRegister()">Register</button>
      <p>Have an account? <a href="#" onclick="openModal('login-modal'); closeModal('register-modal')">Login</a></p>
      <button class="modal-close" onclick="closeModal('register-modal')">✕</button>
    </div>
  </div>

  <footer class="footer">
    <p>&copy; 2026 FirstSaaS. All rights reserved.</p>
  </footer>

  <script src="app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      updateNavAuth();
      if (!getToken()) {
        document.getElementById('cart-content').innerHTML = '<p class="placeholder-text">Please <a href="#" onclick="openModal(\'login-modal\')">login</a> to view your cart.</p>';
        return;
      }
      await loadCart();
    });

    async function loadCart() {
      const cart = await apiFetch('/api/cart/').catch(() => null);
      const container = document.getElementById('cart-content');
      if (!cart || !cart.items.length) {
        container.innerHTML = '<p class="placeholder-text">Your cart is empty. <a href="products.html">Shop now</a></p>';
        return;
      }
      container.innerHTML = `
        <table class="cart-table">
          <thead><tr><th>Product</th><th>Price</th><th>Qty</th><th>Subtotal</th><th></th></tr></thead>
          <tbody>
            ${cart.items.map(item => `
              <tr>
                <td><a href="product.html?id=${item.product_id}">${item.name}</a></td>
                <td>$${item.price.toFixed(2)}</td>
                <td>${item.quantity}</td>
                <td>$${item.subtotal.toFixed(2)}</td>
                <td><button class="btn-danger" onclick="removeItem('${item.product_id}')">Remove</button></td>
              </tr>
            `).join('')}
          </tbody>
        </table>
        <div class="cart-summary">
          <h3>Total: $${cart.total.toFixed(2)}</h3>
          <button class="btn-primary" onclick="doCheckout()">Checkout</button>
          <div id="checkout-msg" class="success-msg hidden"></div>
        </div>
      `;
    }

    async function removeItem(productId) {
      await apiFetch(`/api/cart/${productId}`, 'DELETE').catch(() => {});
      await loadCart();
      updateCartCount();
    }

    async function doCheckout() {
      try {
        const result = await apiFetch('/api/cart/checkout', 'POST');
        const msg = document.getElementById('checkout-msg');
        msg.textContent = `Order placed! Order ID: ${result.order_id}. Total: $${result.total.toFixed(2)}`;
        msg.classList.remove('hidden');
        setTimeout(() => loadCart(), 2000);
        updateCartCount();
      } catch (e) {
        alert(e.message || 'Checkout failed');
      }
    }
  </script>
</body>
</html>
