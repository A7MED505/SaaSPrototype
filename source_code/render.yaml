services:
  - type: web
    name: firstsaas-api
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URL
        sync: false          # Set this in the Render dashboard
      - key: DATABASE_NAME
        value: firstsaas
      - key: SECRET_KEY
        generateValue: true  # Render will auto-generate a secure value
