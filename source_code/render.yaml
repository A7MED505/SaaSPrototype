services:
  - type: web
    name: firstsaas-api
    env: node
    region: oregon
    plan: free
    buildCommand: cd frontend && npm install && npm run build && cd .. && npm install
    startCommand: node app/server.js
    envVars:
      - key: MONGO_URL
        sync: false          # Set this in the Render dashboard
      - key: DATABASE_NAME
        value: firstsaas
      - key: SECRET_KEY
        generateValue: true  # Render will auto-generate a secure value
